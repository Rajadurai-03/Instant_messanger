spring.application.name=backend

# ── Server: bind to all interfaces so LAN devices can reach it ───────────────
server.address=0.0.0.0
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/chatconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── WebSocket / upload size ───────────────────────────────────────────────────
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
